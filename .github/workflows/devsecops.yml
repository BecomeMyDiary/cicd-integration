name: DevSecOps Multi-Cloud Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select Deployment Target'
        required: true
        default: 'gcp'
        type: choice
        options:
          - gcp
          - aws
          - both

env:
  # GCP Variables
  PROJECT_ID: cicd-secure-488915
  GAR_LOCATION: asia-southeast1
  REPOSITORY: ids-repo
  IMAGE: python-ids-app
  SERVICE_NAME: ids-service

  # AWS Variables (App Runner - Simplest)
  AWS_REGION: ap-southeast-1                   # TODO: Change AWS Region
  AWS_ECR_REPOSITORY: ids-repo                 # TODO: Change Amazon ECR Repository Name
  AWS_APP_RUNNER_SERVICE: ids-app-service      # TODO: Change App Runner Service Name
  AWS_APP_RUNNER_ROLE_ARN: arn:aws:iam::181389211438:role/AppRunnerECRAccessRole # TODO: Create a role in IAM for App Runner to access ECR

jobs:
  # ----------------------------------------------------
  # 1. SECURITY SCANS (Secret, SAST, SCA)
  # ----------------------------------------------------
  security-scans:
    name: Code & Dependency Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required by TruffleHog to scan full git history

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        #continue-on-error: true
        with:
          path: ./

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies for SAST/SCA
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Safety (SCA - Dependency Scanning)
        run: |
          if [ -f requirements.txt ]; then
            safety check -r requirements.txt --output text || true
          else
            echo "No requirements.txt found, skipping safety scan."
          fi

      - name: Run Bandit (SAST - Static Application Security Testing)
        #continue-on-error: true
        run: bandit -r . -f json -o bandit-report.json -ll -ii -x "./venv,./.venv,./tests"

      - name: Show Bandit Report
        if: always()
        run: cat bandit-report.json || echo "No Bandit report generated"

  # ----------------------------------------------------
  # 2. BUILD AND CONTAINER IMAGE SCAN
  # ----------------------------------------------------
  build-and-container-scan:
    name: Build & Scan Docker Image
    needs: security-scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Local Docker Image for Scanning
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Run Trivy vulnerability scanner on Image
        uses: aquasecurity/trivy-action@master
        #continue-on-error: true
        with:
          image-ref: '${{ env.IMAGE }}:${{ github.sha }}'
          format: 'table'
          scanners: 'vuln'     # บังคับว่าเช็กเฉพาะช่องโหว่เท่านั้นนะ
          exit-code: '1'       # ถ้าเจอค่อยให้ออกเป็น Code 1 (พัง) แบบชัดๆ
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Generate SBOM for Source Code
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'cyclonedx'
          output: 'source-sbom.json'

      - name: Generate SBOM for Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE }}:${{ github.sha }}'
          format: 'cyclonedx'
          output: 'image-sbom.json'

      - name: Upload SBOM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-reports
          path: |
            source-sbom.json
            image-sbom.json

  # ----------------------------------------------------
  # 3. DEPLOY TO GOOGLE CLOUD
  # ----------------------------------------------------
  deploy-to-gcp:
    name: Deploy to Google Cloud Run
    needs: build-and-container-scan
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && 
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.target_env == 'gcp' || github.event.inputs.target_env == 'both')))
    
    # Required for Workload Identity Federation (OIDC) recommended by Google
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -- Authentication to GCP --
      # PREFERRED: Workload Identity Federation
      # - name: Google Auth (Workload Identity Federation)
      #   id: auth
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: 'projects/123456789/locations/global/workloadIdentityPools/github-pool/providers/github-provider'
      #     service_account: 'my-service-account@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'
          
      # ALTERNATIVE: Service Account Key (Stored in Settings > Secrets and Variables > Actions)
      - name: Google Auth (Service Account JSON)
        id: auth-secret
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use Google Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image to Artifact Registry
        run: |
          export IMAGE_URL=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GAR_LOCATION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
          # Uncomment if the app doesn't serve a web server on a port (like a background IDS job script)
          # job-name: ${{ env.SERVICE_NAME }}-job

  # ----------------------------------------------------
  # 4. DEPLOY TO AWS (APP RUNNER - SIMPLEST)
  # ----------------------------------------------------
  deploy-to-aws:
    name: Deploy to AWS App Runner
    needs: build-and-container-scan
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'workflow_dispatch' && 
      (github.event.inputs.target_env == 'aws' || github.event.inputs.target_env == 'both')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/${{ env.AWS_ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $ECR_REGISTRY/${{ env.AWS_ECR_REPOSITORY }}:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/${{ env.AWS_ECR_REPOSITORY }}:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to AWS App Runner
        uses: awslabs/amazon-app-runner-deploy@main
        with:
          service: ${{ env.AWS_APP_RUNNER_SERVICE }}
          image: ${{ env.IMAGE }}
          access-role-arn: ${{ env.AWS_APP_RUNNER_ROLE_ARN }}
          region: ${{ env.AWS_REGION }}
          cpu: 1
          memory: 2
          port: 8080 # TODO: Adjust to the port your app runs on
          wait-for-service-stability-seconds: 600
